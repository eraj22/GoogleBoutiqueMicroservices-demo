name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./src/frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

    - name: Build and Push cartservice
      uses: docker/build-push-action@v5
      with:
        context: ./src/cartservice
        file: ./src/cartservice/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/cartservice:${{ github.sha }}

    - name: Update Kubernetes manifests
      run: |
        sed -i "s|image: gcr.io/google-samples/microservices-demo/frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}|g" k8s/frontend.yaml
        sed -i "s|image: gcr.io/google-samples/microservices-demo/cartservice:.*|image: ${{ secrets.DOCKER_USERNAME }}/cartservice:${{ github.sha }}|g" k8s/cartservice.yaml

    - name: Commit updated manifests
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        git add k8s/
        git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
        git push
